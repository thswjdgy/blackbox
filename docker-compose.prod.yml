services:
  # ─── PostgreSQL (Internal Only) ───
  db:
    image: postgres:16-alpine
    container_name: blackbox-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-blackbox_db}
      POSTGRES_USER: ${DB_USER:-blackbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No public ports for DB in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blackbox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackbox-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-blackbox_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-blackbox}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /data/uploads
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - uploads:/data/uploads
    expose:
      - "8080"

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: blackbox-frontend-prod
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  # ─── Nginx (Entry Point) ───
  nginx:
    image: nginx:alpine
    container_name: blackbox-nginx-prod
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/data/uploads:ro

volumes:
  pgdata:
  uploads:
