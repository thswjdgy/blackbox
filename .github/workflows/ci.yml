name: CI — Build & Smoke Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. 백엔드 단독 빌드 (Gradle) ──────────────────────────
  backend-build:
    name: Backend Build (Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build (skip tests)
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

  # ── 2. 프론트엔드 단독 빌드 (Next.js) ────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  # ── 3. Docker Compose 전체 스택 빌드 + 스모크 테스트 ────
  docker-smoke:
    name: Docker Compose Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [ backend-build, frontend-build ]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          DB_NAME=blackbox_db
          DB_USER=blackbox
          DB_PASSWORD=ci_test_password
          JWT_SECRET=ci-test-jwt-secret-key-for-github-actions
          NEXT_PUBLIC_API_URL=/api
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend (최대 60초)
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost/api/actuator/health > /dev/null 2>&1; then
              echo "✅ Backend healthy"
              break
            fi
            echo "⏳ Waiting... ($i/12)"
            sleep 5
          done

      - name: Smoke test — 회원가입 API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost/api/auth/signup \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@blackbox.com","password":"test1234","name":"CI User","studentId":"CI001"}')
          echo "Signup status: $STATUS"
          # 200(성공) or 409(이미 존재) 모두 OK
          [[ "$STATUS" == "200" || "$STATUS" == "201" || "$STATUS" == "409" ]] || exit 1

      - name: Smoke test — 로그인 API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@blackbox.com","password":"test1234"}')
          echo "Login status: $STATUS"
          [[ "$STATUS" == "200" ]] || exit 1

      - name: Show logs (실패 시)
        if: failure()
        run: docker compose logs --tail=80

      - name: Teardown
        if: always()
        run: docker compose down -v
