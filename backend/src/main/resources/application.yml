spring:
  application:
    name: blackbox

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blackbox_db}
    username: ${SPRING_DATASOURCE_USERNAME:blackbox}
    password: ${SPRING_DATASOURCE_PASSWORD:blackbox1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:blackbox-super-secret-jwt-key-change-in-production}
  access-expiration: 1800000    # 30분 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

file:
  upload-dir: ${FILE_UPLOAD_DIR:/data/uploads}

notion:
  token:       ${NOTION_TOKEN:}
  database-id: ${NOTION_DATABASE_ID:}

google:
  client-id:     ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri:  ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/google/oauth/callback}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    com.blackbox: DEBUG
    org.springframework.security: INFO