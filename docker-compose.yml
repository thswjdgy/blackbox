services:
  # ─── PostgreSQL ───
  db:
    image: postgres:16-alpine
    container_name: blackbox-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-blackbox_db}
      POSTGRES_USER: ${DB_USER:-blackbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blackbox}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackbox-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-blackbox_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-blackbox}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FILE_UPLOAD_DIR: /data/uploads
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
    volumes:
      - uploads:/data/uploads
    expose:
      - "8080"

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: blackbox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  # ─── Nginx ───
  nginx:
    image: nginx:alpine
    container_name: blackbox-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/data/uploads:ro

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local